spring.application.name=ems-backend

# ============================================
# Database Configuration
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/ems?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# ============================================
# Hibernate/JPA Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# JWT Configuration
# ============================================
# Secret key for JWT signing (256-bit minimum for HMAC-SHA256)
app.jwt.secret=mySecretKeyForJWTTokenGenerationAndValidationPurposeOnly12345

# Token expiration time in milliseconds (86400000 = 24 hours)
app.jwt.expiration=86400000

# ============================================
# Spring Security & CORS Configuration
# ============================================
server.servlet.context-path=/

# Error response configuration (Spring Boot 3.0+)
spring.web.error.include-message=always
spring.web.error.include-stacktrace=on_param

# ============================================
# Logging Configuration
# ============================================
logging.level.root=INFO
logging.level.com.ems=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================
# Server Configuration
# ============================================
server.port=8080