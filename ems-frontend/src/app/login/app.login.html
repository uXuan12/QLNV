<div class="min-h-screen bg-gradient-to-br from-blue-600 to-blue-800 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <!-- Login Card -->
    <div class="bg-white rounded-lg shadow-2xl p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">EMS</h1>
        <p class="text-gray-600 mt-2">Employee Management System</p>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-md">
        {{ errorMessage }}
      </div>

      <!-- Login Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <!-- Username Field -->
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
            Username <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            id="username"
            formControlName="username"
            placeholder="Enter your username"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            [class.border-red-500]="usernameControl?.invalid && usernameControl?.touched"
          />
          <div *ngIf="usernameControl?.invalid && usernameControl?.touched" class="mt-1 text-sm text-red-600">
            <p *ngIf="usernameControl?.errors?.['required']">Username is required</p>
            <p *ngIf="usernameControl?.errors?.['minlength']">Username must be at least 3 characters</p>
          </div>
        </div>

        <!-- Password Field -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
            Password <span class="text-red-500">*</span>
          </label>
          <input
            type="password"
            id="password"
            formControlName="password"
            placeholder="Enter your password"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            [class.border-red-500]="passwordControl?.invalid && passwordControl?.touched"
          />
          <div *ngIf="passwordControl?.invalid && passwordControl?.touched" class="mt-1 text-sm text-red-600">
            <p *ngIf="passwordControl?.errors?.['required']">Password is required</p>
            <p *ngIf="passwordControl?.errors?.['minlength']">Password must be at least 6 characters</p>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="isSubmitDisabled()"
          class="w-full mt-6 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-semibold py-2 px-4 rounded-lg transition duration-200"
        >
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="flex items-center justify-center">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Logging in...
          </span>
        </button>
      </form>

      <!-- Footer -->
      <p class="text-center text-gray-600 text-sm mt-6">
        Don't have an account? <a href="#" class="text-blue-600 hover:underline">Contact Admin</a>
      </p>
    </div>
  </div>
</div>
